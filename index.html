<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>CIMA 會議紀錄控管系統1.1</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
    .container { max-width: 900px; margin: auto; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
    textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 15px; font-size: 14px; box-sizing: border-box; }
    button { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .primary-btn { background: #007bff; color: white; width: 100%; margin-top: 10px; font-size: 16px; }
    .primary-btn:hover { background: #0056b3; }
    
    .topic-card { border-left: 5px solid #007bff; padding: 15px; margin-bottom: 20px; background: #fff; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .category-tag { font-size: 12px; color: #666; background: #e9ecef; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
    .topic-title { font-weight: bold; font-size: 17px; color: #1a1a1a; margin-bottom: 10px; }
    .topic-content { font-size: 14px; color: #444; white-space: pre-wrap; margin-bottom: 15px; border-top: 1px solid #eee; padding-top: 10px; }
    
    .stt-box { background: #fffde7; border: 1px dashed #ffd600; padding: 10px; margin-top: 10px; font-style: italic; min-height: 40px; border-radius: 4px; display: none; }
    .controls { display: flex; gap: 10px; }
    .btn-speak { background: #28a745; color: white; }
    .btn-record { background: #dc3545; color: white; }
    .recording { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>1. 貼上會議議程文字</h2>
    <textarea id="agendaInput" rows="10" placeholder="直接在此貼上議程全文..."></textarea>
    <button id="analyzeBtn" class="primary-btn" onclick="analyzeAgenda()">🤖 AI 結構化分類與拆解</button>
  </div>

  <div id="loading" style="display:none; text-align:center;">AI 正在解析長文內容，請稍候...</div>

  <div id="meetingArea" style="display:none;">
    <h2>2. 會議導引與紀錄</h2>
    <div id="topicList"></div>
  </div>
</div>

<script>
  // 【重要】請替換為您的 GAS Web App URL
  const GAS_URL = "https://script.google.com/macros/library/d/1WhRwUGdhbUCFfzfl1LN-rvsMnVAi0VIjMG_ByHjMDTvnbhesRi4s0cNN/5";

  async function analyzeAgenda() {
    const text = document.getElementById('agendaInput').value;
    if (!text) return alert("請貼上議程！");
    
    document.getElementById('loading').style.display = "block";
    document.getElementById('analyzeBtn').disabled = true;

    try {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ agendaText: text })
      });
      const data = await response.json();
      renderTopics(data);
    } catch (e) {
      alert("解析失敗：" + e);
    } finally {
      document.getElementById('loading').style.display = "none";
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  function renderTopics(topics) {
    const list = document.getElementById('topicList');
    list.innerHTML = '';
    document.getElementById('meetingArea').style.display = "block";

    topics.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.innerHTML = `
        <span class="category-tag">${item.category}</span>
        <div class="topic-title">${item.topic}</div>
        <div class="topic-content">${item.description}</div>
        <div class="controls">
          <button class="btn-speak" onclick="speak('${item.topic}。${item.description}')">🔊 朗讀引導</button>
          <button class="btn-record" id="rec-btn-${index}" onclick="toggleRecord(${index})">🎤 開始討論(錄音)</button>
        </div>
        <div class="stt-box" id="stt-${index}">即時轉錄文字將顯示於此...</div>
      `;
      list.appendChild(card);
    });
  }

  // 語音朗讀 (TTS)
  function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'zh-TW';
    window.speechSynthesis.speak(msg);
  }

  // 語音轉文字 (STT) 簡單實作
  let recognition;
  function toggleRecord(index) {
    const btn = document.getElementById(`rec-btn-${index}`);
    const box = document.getElementById(`stt-${index}`);

    if (btn.classList.contains('recording')) {
      recognition.stop();
      btn.classList.remove('recording');
      btn.innerText = "🎤 開始討論(錄音)";
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("瀏覽器不支援語音辨識");

    recognition = new SpeechRecognition();
    recognition.lang = 'zh-TW';
    recognition.continuous = true;
    recognition.interimResults = true;

    box.style.display = "block";
    btn.classList.add('recording');
    btn.innerText = "🛑 停止並存檔";

    recognition.onresult = (event) => {
      let resultText = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        resultText += event.results[i][0].transcript;
      }
      box.innerText = resultText;
    };
    
    recognition.start();
  }
</script>
</body>
</html>
